name: Deploy Function QC

on:
  push:
    branches:
      - main
    paths:
      - 'aula03/function/**'

permissions:
  id-token: write   # necessário para OIDC
  contents: read

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r aula03/function/requirements.txt
          pip install ruff pytest

      - name: Lint com ruff
        run: ruff check aula03/function/

      - name: Testes unitários
        run: pytest aula03/function/tests/ -v

  deploy:
    name: Deploy para Azure
    needs: lint-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure via OIDC (sem secrets!)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Azure Functions Core Tools
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy Function (slot staging)
        run: |
          cd aula03/function
          func azure functionapp publish func-qc-${{ secrets.SUFIXO }} \
            --python \
            --slot staging

      - name: Smoke test no slot staging
        run: |
          STAGING_URL="https://func-qc-${{ secrets.SUFIXO }}-staging.azurewebsites.net"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$STAGING_URL/api/produtos?categoria=moveis")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Swap slot staging → production
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp deployment slot swap \
              --name func-qc-${{ secrets.SUFIXO }} \
              --resource-group rg-qc-aula03-${{ secrets.SUFIXO }} \
              --slot staging \
              --target-slot production

      - name: Logout Azure
        if: always()
        run: az logout